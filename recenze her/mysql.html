<section class="max-w-7xl mx-auto px-4 py-12">
        <h2 class="text-3xl font-extrabold text-gray-900 mb-6">Aktuality z her</h2>
        
        <div id="zpravy-kontejner" class="flex flex-col gap-4">
            <p class="text-gray-500 animate-pulse">Připojuju se jjpj</p>
        </div>
    </section>

    <script>
    function nactiRecenze() {
        fetch('/api/aktuality')
            .then(odpoved => odpoved.json())
            .then(data => {
                const kontejner = document.getElementById('zpravy-kontejner');
                kontejner.innerHTML = ''; 

                data.forEach(polozka => {
                    kontejner.innerHTML += `
                        <div class="bg-gray-800/50 border-l-4 border-indigo-500 p-5 rounded-r-xl shadow-lg backdrop-blur-sm">
                            <h3 class="text-2xl font-bold text-white mb-1">${polozka.hra}</h3>
                            <p class="text-sm text-indigo-400 font-semibold mb-3">Recenzuje: ${polozka.jmeno}</p>
                            <p class="text-gray-300 leading-relaxed">${polozka.zprava}</p>
                        </div>
                    `;
                });
            });
    }

   
        nactiRecenze();
    </script>
